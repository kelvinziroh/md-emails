<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "https://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="https://www.w3.org/1999/xhtml">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Professional Email Template</title>
        <style type="text/css">
            /* Client-specific styles to fix rendering issues */
            body,
            table,
            td,
            a {
                -webkit-text-size-adjust: 100%;
                -ms-text-size-adjust: 100%;
            }
            table,
            td {
                mso-table-lspace: 0pt;
                mso-table-rspace: 0pt;
            }
            img {
                -ms-interpolation-mode: bicubic;
                border: 0;
                height: auto;
                line-height: 100%;
                outline: none;
                text-decoration: none;
            }
            table {
                border-collapse: collapse !important;
            }
            body {
                height: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                background-color: #f4f4f4;
            }
        </style>
    </head>
    <body
        style="
            font-family:
                &quot;DejaVu Sans Mono&quot;, &quot;Inconsolata&quot;,
                &quot;Courier New&quot;, monospace;
            margin: 0;
            padding: 0;
        "
    >
        <table border="0" cellpadding="0" cellspacing="0" width="100%">
            <tr>
                <td align="center" style="padding: 20px 0">
                    <table
                        border="0"
                        cellpadding="0"
                        cellspacing="0"
                        width="600"
                        style="
                            background-color: #ffffff;
                            border: 1px solid #dddddd;
                        "
                    >
                        <tr class="article">
                            <td
                                style="
                                    padding: 40px;
                                    color: #333333;
                                    line-height: 1.6;
                                    font-size: 16px;
                                "
                            >
                                {{ content }}
                            </td>
                        </tr>

                        <tr class="footer">
                            <td
                                style="
                                    padding: 30px;
                                    background-color: #f9f9f9;
                                    border-top: 1px solid #eeeeee;
                                    text-align: center;
                                "
                            >
                                <p
                                    style="
                                        margin: 0 0 10px 0;
                                        font-size: 12px;
                                        color: #777777;
                                        text-transform: uppercase;
                                        letter-spacing: 1px;
                                    "
                                >
                                    Contact Us
                                </p>
                                <p
                                    style="
                                        margin: 0 0 20px 0;
                                        font-size: 14px;
                                        color: #333333;
                                    "
                                >
                                    123 Tech Lane, Silicon Valley, CA<br />
                                    <a
                                        href="mailto:hello@example.com"
                                        style="
                                            color: #007bff;
                                            text-decoration: none;
                                        "
                                        >hello@example.com</a
                                    >
                                    | +1 (555) 000-0000
                                </p>

                                <table
                                    border="0"
                                    cellpadding="0"
                                    cellspacing="0"
                                    width="100%"
                                >
                                    <tr>
                                        <td align="center">
                                            <table
                                                border="0"
                                                cellpadding="0"
                                                cellspacing="0"
                                            >
                                                <tr>
                                                    <td style="padding: 0 10px">
                                                        <a
                                                            href="#"
                                                            style="
                                                                font-size: 12px;
                                                                color: #007bff;
                                                                text-decoration: none;
                                                                font-weight: bold;
                                                            "
                                                            >TWITTER</a
                                                        >
                                                    </td>
                                                    <td style="padding: 0 10px">
                                                        <a
                                                            href="#"
                                                            style="
                                                                font-size: 12px;
                                                                color: #007bff;
                                                                text-decoration: none;
                                                                font-weight: bold;
                                                            "
                                                            >LINKEDIN</a
                                                        >
                                                    </td>
                                                    <td style="padding: 0 10px">
                                                        <a
                                                            href="#"
                                                            style="
                                                                font-size: 12px;
                                                                color: #007bff;
                                                                text-decoration: none;
                                                                font-weight: bold;
                                                            "
                                                            >GITHUB</a
                                                        >
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                    </tr>
                                </table>

                                <p
                                    style="
                                        margin: 25px 0 0 0;
                                        font-size: 11px;
                                        color: #aaaaaa;
                                    "
                                >
                                    &copy; 2026 Your Company. All rights
                                    reserved. <br />
                                    <a
                                        href="#"
                                        style="
                                            color: #aaaaaa;
                                            text-decoration: underline;
                                        "
                                        >Unsubscribe</a
                                    >
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
